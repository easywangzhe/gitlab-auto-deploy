<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E24329"/>
      <stop offset="100%" style="stop-color:#A63D28"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E0E0E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect x="64" y="64" width="896" height="896" rx="180" ry="180" fill="url(#bgGrad)"/>

  <!-- Git branch symbol -->
  <g transform="translate(512, 380)" filter="url(#shadow)">
    <!-- Left branch -->
    <circle cx="-120" cy="0" r="50" fill="white"/>
    <rect x="-145" y="-30" width="25" height="200" rx="12" fill="white"/>

    <!-- Right branch -->
    <circle cx="120" cy="0" r="50" fill="white"/>
    <rect x="120" y="-30" width="25" height="200" rx="12" fill="white"/>

    <!-- Center line -->
    <rect x="-12" y="-30" width="25" height="300" rx="12" fill="white"/>

    <!-- Top node -->
    <circle cx="0" cy="-50" r="60" fill="white"/>
  </g>

  <!-- Upload/Deploy arrow -->
  <g transform="translate(512, 720)" filter="url(#shadow)">
    <!-- Arrow body -->
    <polygon points="0,-120 80,20 40,20 40,100 -40,100 -40,20 -80,20" fill="white"/>
  </g>

  <!-- Small rocket accent -->
  <g transform="translate(750, 200)">
    <path d="M0,-40 L15,0 L10,0 L10,30 L-10,30 L-10,0 L-15,0 Z" fill="white" opacity="0.9"/>
    <circle cx="0" cy="-20" r="8" fill="#E24329"/>
  </g>
</svg>