name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm electron-builder --mac --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: |
            dist/*.dmg
            dist/*.zip

  build-mac-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm electron-builder --mac --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: mac-x64
          path: |
            dist/*.dmg
            dist/*.zip

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: win-x64
          path: dist/*.exe

  release:
    needs: [build-mac-arm64, build-mac-x64, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: mac-arm64
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: mac-x64
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: win-x64
          path: dist/
      - id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - run: ls -la dist/
      - uses: softprops/action-gh-release@v1
        with:
          name: Release v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## GitLab Auto Deploy v${{ steps.get_version.outputs.VERSION }}

            ### 下载安装包

            | 平台 | 文件 |
            |------|------|
            | macOS (Intel) | `GitLab Auto Deploy-${{ steps.get_version.outputs.VERSION }}-x64.dmg` |
            | macOS (Apple Silicon) | `GitLab Auto Deploy-${{ steps.get_version.outputs.VERSION }}-arm64.dmg` |
            | Windows (64-bit) | `GitLab Auto Deploy Setup ${{ steps.get_version.outputs.VERSION }}.exe` |

            ### 更新说明

            请查看 [commits](https://github.com/${{ github.repository }}/commits/v${{ steps.get_version.outputs.VERSION }}) 了解详细更新内容。
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}